<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HydroList | A Super-Fast Reactive Todo App</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Styles & Animations -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Main Application Logic -->
  <!-- The critical type="module" attribute is added here -->
  <script src="app.js" type="module" defer></script>
</head>
<body class="bg-slate-900 text-slate-300 font-sans">

  <div class="max-w-xl mx-auto mt-16 px-4">

    <!-- Header -->
    <header class="text-center mb-10">
      <h1 class="text-5xl font-bold bg-gradient-to-r from-violet-500 to-fuchsia-500 text-transparent bg-clip-text">
        HydroList
      </h1>
      <p class="text-slate-500 mt-2">Powered by HydroDB</p>
    </header>

    <!-- Input Form -->
    <form id="todo-form" class="mb-6">
      <div class="relative">
        <input 
          type="text" 
          id="todo-input"
          placeholder="What needs to be done?"
          class="w-full px-4 py-3 bg-slate-800 rounded-lg border-2 border-transparent focus:outline-none focus:ring-2 focus:ring-violet-600 transition-shadow"
          autocomplete="off"
        >
        <button 
          type="submit" 
          class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-md bg-violet-600 hover:bg-violet-500 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-800 focus:ring-violet-500"
          aria-label="Add new todo"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
          </svg>
        </button>
      </div>
    </form>

    <!-- Filters and Stats -->
    <div id="controls" class="flex justify-between items-center text-sm text-slate-500 mb-4 px-2">
      <p id="items-left">0 items left</p>
      <div id="filter-buttons" class="flex space-x-2">
        <button data-filter="all" class="filter-btn active">All</button>
        <button data-filter="active" class="filter-btn">Active</button>
        <button data-filter="completed" class="filter-btn">Completed</button>
      </div>
    </div>

    <!-- Todo List -->
    <div class="bg-slate-800 rounded-lg shadow-lg">
      <ul id="todo-list">
        <!-- Todo items will be dynamically inserted here by app.js -->
      </ul>
      
      <!-- Empty State Message -->
      <div id="empty-state" class="text-center py-12 px-6 hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="mt-4 text-slate-500">All clear! Add a new task to get started.</p>
      </div>
    </div>

    <!-- Instructions Footer -->
    <footer class="text-center mt-8 text-xs text-slate-600">
      <p>Click a task to toggle completion. Hover to delete.</p>
    </footer>

  </div>

</body>
</html>
