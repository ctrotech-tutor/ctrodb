<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CtroDB UMD Example</title>
  <style>
    body { font-family: system-ui, sans-serif; line-height: 1.6; padding: 2rem; max-width: 600px; margin: auto; background-color: #f7fafc; }
    h1 { color: #2d3748; }
    button { background-color: #4299e1; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.25rem; cursor: pointer; }
    button:hover { background-color: #2b6cb0; }
    #user-list { list-style-type: none; padding: 0; }
    #user-list li { background-color: white; padding: 0.5rem; border-radius: 0.25rem; margin-top: 0.5rem; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); }
    pre { background-color: #edf2f7; padding: 1rem; border-radius: 0.25rem; white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body>

  <h1>CtroDB UMD Script Example</h1>
  <p>This example demonstrates using CtroDB directly from a script tag, without any bundler or module system.</p>

  <button id="add-user-btn">Add a New User</button>
  
  <h2>User List (Live Updates)</h2>
  <ul id="user-list">
    <li>Loading...</li>
  </ul>

  <h2>Log Output:</h2>
  <pre id="log-output">Initializing...</pre>

  <!-- 
    IMPORTANT: We are loading the UMD build file directly.
    This file is generated by running `npm run build`.
  -->
  <script src="../../dist/ctrodb.umd.js"></script>

  <script>
    // This script runs AFTER ctrodb.umd.js has loaded and created the global CtroDB variable.

    const userListElement = document.getElementById('user-list');
    const addUserBtn = document.getElementById('add-user-btn');
    const logOutputElement = document.getElementById('log-output');

    function log(message) {
      console.log(message);
      logOutputElement.textContent = `${new Date().toLocaleTimeString()}: ${message}\n${logOutputElement.textContent}`;
    }

    // Access the classes from the global CtroDB object
    const { Database, Schema, LogLevel } = CtroDB;

    log('CtroDB global object is available.');

    // 1. Define the schema
    const userSchema = new Schema({
      version: 1,
      collections: {
        users: {
          fields: {
            name: 'string',
            createdAt: 'number'
          },
          indexes: ['createdAt']
        }
      }
    });
    log('Schema defined.');

    // 2. Initialize the database
    const db = new Database({
      schema: userSchema,
      dbName: 'UMD_Example_DB',
      logLevel: LogLevel.NONE // Keep the console clean for this example
    });
    log('Database instance created.');

    async function main() {
      try {
        await db.connect();
        log('Database connected successfully.');

        const usersCollection = db.getCollection('users');

        // 3. Set up a live observer to render the UI
        usersCollection.query().observe(users => {
          log(`Observer fired! Found ${users.length} users. Rendering UI.`);
          userListElement.innerHTML = ''; // Clear the list
          if (users.length === 0) {
            userListElement.innerHTML = '<li>No users yet. Click the button to add one!</li>';
          }
          users.sort((a, b) => a.createdAt - b.createdAt).forEach(user => {
            const li = document.createElement('li');
            li.textContent = `ID: ${user.id}, Name: ${user.name}`;
            userListElement.appendChild(li);
          });
        });

        // 4. Add a click listener to create new users
        addUserBtn.addEventListener('click', async () => {
          const userName = `User #${Math.floor(Math.random() * 1000)}`;
          log(`Adding new user: ${userName}`);
          await usersCollection.create({
            name: userName,
            createdAt: Date.now()
          });
          log('User added successfully.');
        });

      } catch (error) {
        log(`An error occurred: ${error.message}`);
        console.error(error);
      }
    }

    // Start the application
    main();

  </script>

</body>
</html>
