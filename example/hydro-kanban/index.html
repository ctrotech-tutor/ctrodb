<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroKanban</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Defer loading of the app logic -->
    <script src="app.js" type="module" defer></script>
</head>
<body class="h-full flex flex-col antialiased">

    <!-- Header -->
    <header class="p-4 bg-gray-800/50 backdrop-blur-sm border-b border-gray-700 shadow-lg z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 id="board-title" class="text-2xl font-bold text-white">Loading Board...</h1>
            <!-- Placeholder for future controls like 'Filter' or 'Users' -->
        </div>
    </header>

    <!-- Main Kanban Board -->
    <main class="flex-1 flex overflow-x-auto p-4 space-x-4">
        <!-- This is where columns will be dynamically inserted by app.js -->
        <div id="kanban-board" class="flex-1 flex items-start space-x-4 h-full">
            <!-- Example Column Structure (for reference, will be generated by JS) -->
            <!-- 
            <div class="column w-72 bg-gray-800 rounded-lg shadow-md flex-shrink-0">
                <h3 class="font-bold p-3 text-lg border-b border-gray-700">Column Title</h3>
                <div class="card-list p-2 space-y-2 overflow-y-auto">
                    <div class="card p-3 bg-gray-700 rounded-md shadow-sm cursor-grab" draggable="true">
                        Card content goes here.
                    </div>
                </div>
                <button class="add-card-btn p-2 text-gray-400 hover:text-white w-full">
                    + Add a card
                </button>
            </div>
            -->
        </div>

        <!-- Add New Column Button -->
        <div class="flex-shrink-0">
            <button id="add-column-btn" class="w-72 p-3 bg-gray-800/50 hover:bg-gray-700 rounded-lg text-gray-400 hover:text-white transition-colors duration-200">
                + Add another column
            </button>
        </div>
    </main>

    <!-- Hidden Modal for adding a new column -->
    <div id="add-column-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
        <div class="bg-gray-800 p-6 rounded-lg shadow-xl w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">Add New Column</h2>
            <form id="add-column-form">
                <input id="new-column-title" type="text" placeholder="Enter column title..." class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                <div class="mt-4 flex justify-end space-x-2">
                    <button type="button" id="cancel-add-column" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">Add Column</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
