name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install esbuild (pre-warm binary)
        run: npx --yes esbuild --version || true

      - run: npm ci

      - run: npm run typecheck
        name: TypeScript

      - run: npm run lint
        name: Biome Lint

      - run: npm test
        name: Tests

      - run: npm run build
        name: Build
