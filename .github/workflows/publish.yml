name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install esbuild (pre-warm binary)
        run: npx --yes esbuild --version || true
      - run: npm ci
      - run: npm run typecheck
        name: TypeScript
      - run: npm run lint
        name: Biome Lint
      - run: npm test
        name: Tests
      - run: npm run build
        name: Build

  create-release:
    name: Create GitHub Release
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release body
        id: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true

  publish-npm:
    name: Publish to npm
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: Upgrade npm (required for OIDC)
        run: npm install -g npm@latest
      - name: Strip _authToken from .npmrc (let OIDC kick in)
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          sed -i '/_authToken/d' "$npmrc"
      - run: npm publish --provenance
