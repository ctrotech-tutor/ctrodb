changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: Features
      labels:
        - feat
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - fix
        - bug
        - bugfix
    - title: Performance
      labels:
        - perf
        - performance
    - title: Documentation
      labels:
        - docs
        - documentation
    - title: Maintenance
      labels:
        - chore
        - refactor
        - deps
        - dependencies
        - ci
    - title: Other Changes
      labels:
        - "*"
